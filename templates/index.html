<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cisco Switch Manager</title>
  <script src="/static/js/react.production.min.js"></script>
  <script src="/static/js/react-dom.production.min.js"></script>
  <script src="/static/js/babel.min.js"></script>
  <link href="/static/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-body: #0a0e1a;
      --text-primary: #c8d6e5;
      --text-secondary: #667788;
      --text-tertiary: #556677;
      --card-bg: linear-gradient(145deg, #111d2e, #0f1a2e);
      --card-bg-solid: #0f1a2e;
      --border: #1a3050;
      --navbar-bg: linear-gradient(135deg, #0f1a2e 0%, #1a2a4a 100%);
      --navbar-border: #1e3a5f;
      --accent: #4fc3f7;
      --metric-value: #e8edf2;
      --placeholder: #445566;
      --gauge-bg: #1a3050;
      --accent-rgb: 79, 195, 247;
    }
    [data-theme="light"] {
      --bg-body: #eef2f7;
      --text-primary: #1a2332;
      --text-secondary: #6b7c93;
      --text-tertiary: #8899aa;
      --card-bg: linear-gradient(145deg, #ffffff, #f5f7fa);
      --card-bg-solid: #ffffff;
      --border: #d0d8e4;
      --navbar-bg: linear-gradient(135deg, #ffffff 0%, #e8ecf1 100%);
      --navbar-border: #d0d8e4;
      --accent: #2196f3;
      --metric-value: #1a2332;
      --placeholder: #aab5c5;
      --gauge-bg: #d0d8e4;
      --accent-rgb: 33, 150, 243;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-body); color: var(--text-primary); font-family: 'Segoe UI', system-ui, sans-serif; }
    .navbar { background: var(--navbar-bg) !important; border-bottom: 1px solid var(--navbar-border); padding: 10px 24px; }
    .navbar-brand { font-weight: 700; font-size: 18px; letter-spacing: 0.5px; color: var(--accent) !important; }
    .navbar-brand i { color: var(--accent); margin-right: 8px; }
    .btn-primary-cisco { background: linear-gradient(135deg, #1565c0, #0d47a1); border: 1px solid #1e88e5; color: #fff; }
    .btn-primary-cisco:hover { background: linear-gradient(135deg, #1976d2, #1565c0); color: #fff; }
    .card-switch { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
    .card-switch:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(var(--accent-rgb), 0.15); }
    .card-switch::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), #1565c0); opacity: 0; transition: opacity 0.3s; }
    .card-switch:hover::before { opacity: 1; }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-online { background: rgba(46, 213, 115, 0.2); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.4); }
    .status-offline { background: rgba(255, 71, 87, 0.2); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.4); }
    .gauge-container { position: relative; width: 80px; height: 80px; margin: 0 auto; }
    .gauge-container svg { transform: rotate(-90deg); }
    .gauge-bg { fill: none; stroke: var(--gauge-bg); stroke-width: 6; }
    .gauge-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .gauge-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: 700; }
    .gauge-label { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-chip { background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.2); border-radius: 20px; padding: 3px 12px; font-size: 12px; color: var(--accent); }
    .metric-value { font-size: 13px; font-weight: 600; color: var(--metric-value); }
    .metric-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; }
    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-state i { font-size: 64px; color: var(--border); margin-bottom: 20px; }
    .empty-state h3 { color: var(--text-tertiary); font-weight: 300; }
    .btn-theme { background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.25); color: var(--accent); border-radius: 8px; padding: 4px 10px; font-size: 14px; cursor: pointer; }
    .btn-theme:hover { background: rgba(var(--accent-rgb), 0.2); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .site-section { margin-bottom: 28px; }
    .site-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .site-title i { margin-right: 8px; }
    .badge-filter { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; border: 1px solid var(--border); color: var(--text-secondary); background: transparent; transition: all 0.2s; }
    .badge-filter:hover { border-color: var(--accent); color: var(--accent); }
    .badge-filter.active { background: rgba(var(--accent-rgb), 0.15); border-color: var(--accent); color: var(--accent); }
    .card-action { position: absolute; top: 8px; right: 8px; z-index: 2; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
    .card-switch:hover .card-action { opacity: 1; }
    .btn-action { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 6px; padding: 2px 8px; font-size: 13px; cursor: pointer; }
    .btn-action:hover { background: rgba(var(--accent-rgb), 0.2); color: var(--accent); }
    .btn-action-danger:hover { background: rgba(255,71,87,0.2); color: #ff4757; }
    .refresh-select { background: var(--card-bg-solid); border: 1px solid var(--border); color: var(--accent); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; cursor: pointer; outline: none; }
    .refresh-select:focus { border-color: var(--accent); }
  </style>
  <script>
    (function() {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="container-fluid px-0">
      <span class="navbar-brand"><i class="bi bi-hdd-stack-fill"></i> Cisco Switch Manager</span>
      <div class="d-flex align-items-center gap-2">
        <span style="color:#667788;font-size:12px;"><i class="bi bi-person-fill me-1"></i>{{ current_user or 'guest' }}</span>
        {% if current_role == 'admin' %}
        <a href="/users" class="btn btn-sm btn-outline-secondary" style="border-color:#1a3050;color:#667788"><i class="bi bi-people-fill"></i></a>
        {% endif %}
        <a href="/alerts" class="btn btn-sm btn-outline-secondary" style="border-color:#1a3050;color:#667788;position:relative">
          <i class="bi bi-bell-fill"></i>
          {% if active_alert_count > 0 %}<span style="position:absolute;top:-4px;right:-4px;background:#ff4757;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;line-height:1.3;">{{ active_alert_count }}</span>{% endif %}
        </a>
        <a href="/logs" class="btn btn-sm btn-outline-secondary" style="border-color:#1a3050;color:#667788"><i class="bi bi-journal-text"></i> Logs</a>
        <button class="btn btn-sm btn-theme" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill" id="themeIcon"></i></button>
        <button class="btn btn-sm btn-outline-info" onclick="window.refreshAll()"><i class="bi bi-arrow-clockwise"></i> Refresh All</button>
        <a href="/add" class="btn btn-sm btn-primary-cisco"><i class="bi bi-plus-lg"></i> Add Switch</a>
        <a href="/logout" class="btn btn-sm" style="border-color:#1a3050;color:#667788"><i class="bi bi-box-arrow-right"></i></a>
      </div>
    </div>
  </nav>
  <div id="root" class="container-fluid px-4 py-4"></div>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.className = next === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
}
(function() {
  const t = localStorage.getItem('theme') || 'dark';
  const icon = document.getElementById('themeIcon');
  if (icon) icon.className = t === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
})();
</script>
{% if error %}
<script>window._error = {{ error|tojson }};</script>
{% endif %}
{% raw %}
  <script type="text/babel">
    const { useState, useEffect } = React;

    function Gauge({ value, label, color, max }) {
      const radius = 34;
      const circ = 2 * Math.PI * radius;
      const val = typeof value === 'number' ? Math.min(value, max) : 0;
      const offset = circ - (val / max) * circ;
      return (
        <div className="gauge-container">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle className="gauge-bg" cx="40" cy="40" r={radius} />
            <circle className="gauge-fill" cx="40" cy="40" r={radius}
              stroke={color} strokeDasharray={circ} strokeDashoffset={offset} />
          </svg>
          <div className="gauge-text" style={{ color }}>{value}{label === 'CPU' ? '%' : '%'}</div>
          <div className="gauge-text" style={{ top: '68%', fontSize: 9, color: '#667788' }}>{label}</div>
        </div>
      );
    }

    function MetricCard({ icon, label, value }) {
      return (
        <div className="card-switch p-3 text-center">
          <i className={`bi ${icon}`} style={{ fontSize: 20, color: '#4fc3f7', marginBottom: 6 }}></i>
          <div className="metric-value">{String(value)}</div>
          <div className="metric-label">{label}</div>
        </div>
      );
    }

    const PLATFORM_META_DASH = {
      mds:   { label: 'MDS',   color: '#4fc3f7' },
      nexus: { label: 'Nexus', color: '#2ed573' },
      ios:   { label: 'IOS',   color: '#ffa502' },
    };

    function PlatformBadge({ platform }) {
      const meta = PLATFORM_META_DASH[platform] || PLATFORM_META_DASH.mds;
      if (!platform) return null;
      return <span style={{fontSize:9,fontWeight:600,padding:'1px 8px',borderRadius:10,background:meta.color+'22',color:meta.color,border:'1px solid '+meta.color+'44',marginLeft:6,verticalAlign:'middle'}}>{meta.label}</span>;
    }

    function SwitchCard({ sw, onClick, onEdit, onDelete }) {
      const d = sw.data;
      const online = d && d.reachable;
      const v = online ? d.version_info : {};
      const r = online ? d.resource : {};
      const plat = (d && d.platform) || null;
      return (
        <div className="col-xl-4 col-lg-6 col-md-6 mb-4">
          <div className="card-switch p-3" style={{ position: 'relative' }}>
            <div className="card-action">
              <button className="btn-action" title="Edit" onClick={(e) => { e.stopPropagation(); onEdit(sw.id); }}><i className="bi bi-pencil"></i></button>
              <button className="btn-action btn-action-danger" title="Delete" onClick={(e) => { e.stopPropagation(); onDelete(sw); }}><i className="bi bi-trash"></i></button>
            </div>
            <div onClick={() => onClick(sw.id)}>
              <div className="d-flex justify-content-between align-items-start mb-2">
                <div>
                  <h6 className="mb-0" style={{ color: '#e8edf2', fontWeight: 600 }}>{sw.label}<PlatformBadge platform={plat} /></h6>
                  <small style={{ color: '#667788' }}>{sw.host}</small>
                  {sw.site ? <small style={{ color: '#4fc3f7', marginLeft: 6, fontSize: 10 }}><i className="bi bi-building me-1"></i>{sw.site}</small> : null}
                </div>
                <span className={`status-badge ${online ? 'status-online' : 'status-offline'}`}>
                  {online ? 'Online' : 'Offline'}
                </span>
              </div>
              {online ? (
                <>
                  <div className="row g-2 mb-2">
                    <div className="col-4 text-center">
                      <Gauge value={r.cpu_usage} label="CPU" color={r.cpu_usage > 80 ? '#ff4757' : '#2ed573'} max={100} />
                    </div>
                    <div className="col-4 text-center">
                      <Gauge value={r.memory_usage_pct} label="MEM" color={r.memory_usage_pct > 80 ? '#ff4757' : '#4fc3f7'} max={100} />
                    </div>
                    <div className="col-4 d-flex flex-column justify-content-center gap-1">
                      <div><span className="metric-label">Model</span><br /><span className="metric-value" style={{fontSize:11}}>{v.model || 'N/A'}</span></div>
                      <div><span className="metric-label">Ver</span><br /><span className="metric-value" style={{fontSize:11}}>{v.version || 'N/A'}</span></div>
                    </div>
                  </div>
                  <div className="d-flex flex-wrap gap-1">
                    {d.interfaces ? <span className="stat-chip"><i className="bi bi-plug-fill me-1"></i>{d.interfaces.length} Intf</span> : null}
                    {plat === 'mds' && d.vsans ? <span className="stat-chip"><i className="bi bi-diagram-3-fill me-1"></i>{d.vsans.length} VSAN</span> : null}
                    {plat !== 'mds' && d.vlans ? <span className="stat-chip"><i className="bi bi-diagram-3-fill me-1"></i>{d.vlans.length} VLAN</span> : null}
                    {d.modules ? <span className="stat-chip"><i className="bi bi-cpu-fill me-1"></i>{d.modules.length} Mod</span> : null}
                    {plat === 'mds' && d.fcns ? <span className="stat-chip"><i className="bi bi-boxes me-1"></i>{d.fcns.length} FCNS</span> : null}
                  </div>
                </>
              ) : (
                <div className="text-center py-3">
                  <small style={{ color: '#ff4757' }}>{d ? d.error : 'No data'}</small>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const REFRESH_OPTIONS = [
      { value: 0,  label: 'Off' },
      { value: 10, label: '10s' },
      { value: 30, label: '30s' },
      { value: 60, label: '60s' },
      { value: 120,label: '120s' },
    ];

    function RefreshDropdown({ value, onChange }) {
      return (
        <select className="refresh-select" value={value} onChange={e => onChange(Number(e.target.value))}>
          {REFRESH_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      );
    }

    const SEVERITY_META = {
      critical: { label: 'Critical', color: '#ff4757', icon: 'bi-exclamation-triangle-fill', bg: 'rgba(255,71,87,0.12)' },
      warning:  { label: 'Warning',  color: '#ffa502', icon: 'bi-exclamation-circle-fill',  bg: 'rgba(255,165,2,0.12)' },
      info:     { label: 'Info',     color: '#4fc3f7', icon: 'bi-info-circle-fill',         bg: 'rgba(79,195,247,0.12)' },
    };

    function AlertSummary({ refreshKey }) {
      const [summary, setSummary] = useState({ total: 0, critical: 0, warning: 0, info: 0 });

      useEffect(() => {
        fetch('/api/alerts/summary')
          .then(r => r.json())
          .then(d => setSummary(d))
          .catch(() => {});
      }, [refreshKey]);

      if (summary.total === 0) return null;

      return (
        <div style={{
          background: 'linear-gradient(135deg, #111d2e, #0f1a2e)',
          border: '1px solid #1a3050',
          borderRadius: 12,
          padding: '16px 20px',
          marginBottom: 20,
        }}>
          <div className="d-flex justify-content-between align-items-center mb-2">
            <div style={{ fontSize: 13, fontWeight: 600, color: '#c8d6e5' }}>
              <i className="bi bi-bell-fill me-2" style={{ color: '#ff4757' }}></i>
              Active Alerts
            </div>
            <a href="/alerts" style={{ fontSize: 11, color: '#4fc3f7', textDecoration: 'none' }}>
              View All <i className="bi bi-arrow-right"></i>
            </a>
          </div>
          <div className="d-flex gap-3 flex-wrap">
            {Object.entries(SEVERITY_META).map(([key, meta]) => {
              const count = summary[key] || 0;
              if (count === 0) return null;
              return (
                <div key={key} style={{
                  background: meta.bg,
                  border: `1px solid ${meta.color}44`,
                  borderRadius: 10,
                  padding: '10px 18px',
                  minWidth: 120,
                  flex: '1 1 auto',
                }}>
                  <div className="d-flex align-items-center gap-2 mb-1">
                    <i className={`bi ${meta.icon}`} style={{ color: meta.color, fontSize: 14 }}></i>
                    <span style={{ fontSize: 11, color: meta.color, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5 }}>
                      {meta.label}
                    </span>
                  </div>
                  <div style={{ fontSize: 28, fontWeight: 700, color: meta.color, lineHeight: 1 }}>
                    {count}
                  </div>
                </div>
              );
            })}
            {summary.total > 0 && (
              <div style={{
                background: 'rgba(var(--accent-rgb), 0.08)',
                border: '1px solid rgba(var(--accent-rgb), 0.2)',
                borderRadius: 10,
                padding: '10px 18px',
                minWidth: 120,
                flex: '1 1 auto',
              }}>
                <div className="d-flex align-items-center gap-2 mb-1">
                  <i className="bi bi-list-check" style={{ color: 'var(--accent)', fontSize: 14 }}></i>
                  <span style={{ fontSize: 11, color: 'var(--accent)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5 }}>
                    Total
                  </span>
                </div>
                <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--accent)', lineHeight: 1 }}>
                  {summary.total}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Dashboard() {
      const [switches, setSwitches] = useState([]);
      const [loading, setLoading] = useState(true);
      const [siteFilter, setSiteFilter] = useState('');
      const [alertRefreshKey, setAlertRefreshKey] = useState(0);
      const [refreshSec, setRefreshSec] = useState(() => {
        const saved = localStorage.getItem('refreshInterval');
        return saved !== null ? Number(saved) : 30;
      });

      const loadData = () => {
        fetch('/api/switches')
          .then(r => r.json())
          .then(data => { setSwitches(data); setLoading(false); setAlertRefreshKey(k => k + 1); })
          .catch(() => { setLoading(false); });
      };

      useEffect(() => {
        loadData();
        if (refreshSec > 0) {
          const id = setInterval(loadData, refreshSec * 1000);
          return () => clearInterval(id);
        }
      }, [refreshSec]);

      const handleRefreshChange = (val) => {
        setRefreshSec(val);
        localStorage.setItem('refreshInterval', String(val));
      };

      window.refreshAll = () => {
        fetch('/api/refresh_all', { method: 'POST' })
          .then(() => setTimeout(loadData, 1000));
      };

      const openSwitch = (id) => { window.location.href = '/switch/' + id; };
      const editSwitch = (id) => { window.location.href = '/edit/' + id; };
      const deleteSwitch = (sw) => {
        if (!confirm('Delete switch "' + (sw.label || sw.host) + '" (' + sw.host + ')?\nThis cannot be undone.')) return;
        fetch('/api/switch/' + sw.id, { method: 'DELETE' })
          .then(r => r.json())
          .then(() => loadData());
      };

      const sites = [...new Set(switches.map(s => s.site || 'Uncategorized'))].sort();
      const filtered = siteFilter ? switches.filter(s => (s.site || 'Uncategorized') === siteFilter) : switches;

      const bySite = {};
      filtered.forEach(s => {
        const site = s.site || 'Uncategorized';
        if (!bySite[site]) bySite[site] = [];
        bySite[site].push(s);
      });

      return (
        <>
          {loading && switches.length === 0 ? (
            <div className="empty-state">
              <i className="bi bi-hdd-stack-fill loading-pulse"></i>
              <h3>Loading switches...</h3>
            </div>
          ) : switches.length === 0 ? (
            <div className="empty-state">
              <i className="bi bi-hdd-stack"></i>
              <h3>No switches configured</h3>
              <p style={{ color: '#667788', marginBottom: 20 }}>Add your first switch to get started</p>
              <a href="/add" className="btn btn-primary-cisco btn-lg"><i className="bi bi-plus-lg me-2"></i>Add Switch</a>
            </div>
          ) : (
            <>
              <AlertSummary refreshKey={alertRefreshKey} />
              <div className="d-flex justify-content-between align-items-center mb-3">
                <h5 style={{ fontWeight: 300, color: '#8899aa' }}><i className="bi bi-hdd-stack me-2"></i>{switches.length} Switch{switches.length > 1 ? 'es' : ''}</h5>
                <div className="d-flex align-items-center gap-2">
                  <i className="bi bi-arrow-repeat" style={{fontSize:11,color:'#4fc3f7'}}></i>
                  <RefreshDropdown value={refreshSec} onChange={handleRefreshChange} />
                </div>
              </div>
              <div className="d-flex flex-wrap gap-2 mb-3">
                <button className={'badge-filter' + (siteFilter === '' ? ' active' : '')} onClick={() => setSiteFilter('')}>All</button>
                {sites.map(s => (
                  <button key={s} className={'badge-filter' + (siteFilter === s ? ' active' : '')} onClick={() => setSiteFilter(s)}>
                    <i className="bi bi-building me-1"></i>{s}
                  </button>
                ))}
              </div>
              {Object.entries(bySite).map(([site, sws]) => (
                <div key={site} className="site-section">
                  <div className="site-title"><i className="bi bi-building"></i>{site} <span style={{fontWeight:400,fontSize:11,color:'var(--text-tertiary)'}}>({sws.length})</span></div>
                  <div className="row">
                    {sws.map(sw => <SwitchCard key={sw.id} sw={sw} onClick={openSwitch} onEdit={editSwitch} onDelete={deleteSwitch} />)}
                  </div>
                </div>
              ))}
            </>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
{% endraw %}
</body>
</html>
