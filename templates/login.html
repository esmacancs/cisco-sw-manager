<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Cisco Switch Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; background: #060a14; overflow: hidden; }
    .login-left { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; }
    .login-left::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(79,195,247,0.06) 0%, transparent 60%); }
    .login-right { flex: 1; background: linear-gradient(135deg, #080e1a 0%, #0c1a30 50%, #060a14 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .login-right::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 50%, rgba(79,195,247,0.08) 0%, transparent 60%); }
    .login-card { position: relative; z-index: 1; width: 100%; max-width: 400px; padding: 44px 36px; }
    .login-card h1 { font-size: 26px; font-weight: 800; color: #e8edf2; letter-spacing: -0.5px; margin-bottom: 4px; }
    .login-card h1 span { color: #4fc3f7; }
    .login-card .subtitle { font-size: 13px; color: #667788; margin-bottom: 32px; font-weight: 400; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; color: #8899aa; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #445566; font-size: 16px; pointer-events: none; transition: color 0.2s; }
    .input-wrap .form-control { width: 100%; background: rgba(15,26,46,0.8); border: 1px solid #1a3050; color: #e8edf2; border-radius: 10px; padding: 12px 14px 12px 42px; font-size: 14px; font-family: 'Inter', sans-serif; transition: all 0.25s; }
    .input-wrap .form-control:focus { background: rgba(15,26,46,0.95); border-color: #4fc3f7; box-shadow: 0 0 0 3px rgba(79,195,247,0.1); outline: none; }
    .input-wrap .form-control:focus + i { color: #4fc3f7; }
    .input-wrap .form-control::placeholder { color: #334455; font-size: 13px; }
    .btn-login { width: 100%; padding: 12px; background: linear-gradient(135deg, #4fc3f7, #1a7fd1); border: none; border-radius: 10px; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; transition: all 0.3s; font-family: 'Inter', sans-serif; letter-spacing: 0.3px; position: relative; overflow: hidden; }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(79,195,247,0.25); }
    .btn-login:active { transform: translateY(0); }
    .error-msg { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.25); color: #ff4757; border-radius: 10px; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .footer-text { text-align: center; margin-top: 24px; font-size: 12px; color: #445566; }
    .footer-text strong { color: #667788; }
    .footer-text a { color: #4fc3f7; text-decoration: none; }
    .footer-text a:hover { text-decoration: underline; }

    /* Right side SVG illustration styles */
    .illustration-wrap { position: relative; z-index: 1; width: 80%; max-width: 520px; }
    .network-svg { width: 100%; height: auto; }
    .node-pulse { animation: pulseNode 3s ease-in-out infinite; }
    .node-pulse:nth-child(2) { animation-delay: 0.5s; }
    .node-pulse:nth-child(3) { animation-delay: 1s; }
    .line-flow { stroke-dasharray: 6; animation: dashFlow 2s linear infinite; }
    @keyframes pulseNode { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes dashFlow { to { stroke-dashoffset: -12; } }
    .glow-dot { animation: glowPulse 2s ease-in-out infinite; }
    @keyframes glowPulse { 0%, 100% { r: 3; opacity: 0.6; } 50% { r: 5; opacity: 1; } }

    .floating-icon { position: absolute; font-size: 20px; color: rgba(79,195,247,0.12); }
    .fi-1 { top: 10%; left: 10%; animation: float 6s ease-in-out infinite; }
    .fi-2 { bottom: 15%; right: 8%; animation: float 8s ease-in-out infinite reverse; }
    .fi-3 { top: 40%; right: 15%; animation: float 7s ease-in-out infinite 2s; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .brand-badge { position: absolute; bottom: 30px; left: 40px; font-size: 11px; color: #334455; letter-spacing: 1px; text-transform: uppercase; }
    .brand-badge i { color: #4fc3f7; margin-right: 6px; }

    @media (max-width: 768px) {
      .login-right { display: none; }
      .login-left { padding: 20px; }
      .login-card { padding: 32px 20px; }
    }

    .theme-toggle { position: absolute; top: 24px; right: 24px; z-index: 10; background: rgba(15,26,46,0.6); border: 1px solid #1a3050; color: #667788; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 16px; }
    .theme-toggle:hover { background: rgba(15,26,46,0.9); color: #4fc3f7; }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill" id="themeIconLogin"></i></button>

  <div class="login-left">
    <div class="login-card">
      <div class="d-flex align-items-center gap-2 mb-1">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#4fc3f7,#1a7fd1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;"><i class="bi bi-hdd-stack-fill"></i></div>
        <span style="font-size:13px;font-weight:600;color:#4fc3f7;letter-spacing:0.5px;">CISCO SWITCH MANAGER</span>
      </div>
      <h1>Welcome<span>.</span></h1>
      <p class="subtitle">Sign in to manage your switches</p>

      {% if error %}
        <div class="error-msg"><i class="bi bi-exclamation-triangle-fill"></i>{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-wrap">
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            <i class="bi bi-person-fill"></i>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            <i class="bi bi-lock-fill"></i>
          </div>
        </div>
        <button type="submit" class="btn-login">Sign In <i class="bi bi-arrow-right ms-2"></i></button>
      </form>

      <div class="footer-text">
        Default credentials: <strong>admin</strong> / <strong>admin</strong>
      </div>
    </div>
    <div class="brand-badge"><i class="bi bi-shield-fill-check"></i> Cisco Switch Manager v2.0</div>
  </div>

  <div class="login-right">
    <i class="bi bi-hdd-stack-fill floating-icon fi-1"></i>
    <i class="bi bi-diagram-3-fill floating-icon fi-2"></i>
    <i class="bi bi-shield-fill floating-icon fi-3"></i>

    <div class="illustration-wrap">
      <svg class="network-svg" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Connection lines -->
        <path d="M250 60 L120 160 L120 280" stroke="#1a3050" stroke-width="2" class="line-flow"/>
        <path d="M250 60 L380 160 L380 280" stroke="#1a3050" stroke-width="2" class="line-flow" style="animation-delay:0.3s"/>
        <path d="M250 60 L250 160" stroke="#1a3050" stroke-width="2"/>
        <path d="M120 280 L80 360" stroke="#1a3050" stroke-width="2" class="line-flow" style="animation-delay:0.6s"/>
        <path d="M380 280 L420 360" stroke="#1a3050" stroke-width="2" class="line-flow" style="animation-delay:0.9s"/>
        <path d="M120 160 L250 160 L380 160" stroke="#1a3050" stroke-width="2"/>
        <path d="M250 160 L250 280" stroke="#1a3050" stroke-width="2" class="line-flow" style="animation-delay:1.2s"/>
        <path d="M120 280 L250 280 L380 280" stroke="#1a3050" stroke-width="2"/>
        <path d="M250 280 L250 360" stroke="#1a3050" stroke-width="2" class="line-flow" style="animation-delay:1.5s"/>
        <path d="M250 360 L190 420" stroke="#1a3050" stroke-width="2" class="line-flow" style="animation-delay:0.2s"/>
        <path d="M250 360 L310 420" stroke="#1a3050" stroke-width="2" class="line-flow" style="animation-delay:0.4s"/>

        <!-- Glowing dots on connection points -->
        <circle cx="250" cy="60" r="3" fill="#4fc3f7" class="glow-dot"/>
        <circle cx="120" cy="160" r="3" fill="#4fc3f7" class="glow-dot" style="animation-delay:0.3s"/>
        <circle cx="250" cy="160" r="3" fill="#4fc3f7" class="glow-dot" style="animation-delay:0.6s"/>
        <circle cx="380" cy="160" r="3" fill="#4fc3f7" class="glow-dot" style="animation-delay:0.9s"/>

        <!-- Main core switch -->
        <rect x="215" y="35" width="70" height="50" rx="8" fill="#0f1a2e" stroke="#4fc3f7" stroke-width="1.5" class="node-pulse"/>
        <rect x="225" y="45" width="14" height="10" rx="2" fill="#4fc3f7" opacity="0.3"/>
        <rect x="245" y="45" width="14" height="10" rx="2" fill="#4fc3f7" opacity="0.3"/>
        <rect x="265" y="45" width="14" height="10" rx="2" fill="#4fc3f7" opacity="0.3"/>
        <rect x="225" y="60" width="14" height="10" rx="2" fill="#4fc3f7" opacity="0.3"/>
        <rect x="245" y="60" width="14" height="10" rx="2" fill="#4fc3f7" opacity="0.3"/>
        <rect x="265" y="60" width="14" height="10" rx="2" fill="#4fc3f7" opacity="0.3"/>

        <!-- Switch 1 (left) -->
        <rect x="85" y="145" width="70" height="30" rx="6" fill="#0f1a2e" stroke="#2ed573" stroke-width="1.2" class="node-pulse" style="animation-delay:0.5s"/>
        <text x="120" y="164" text-anchor="middle" fill="#2ed573" font-size="8" font-family="Inter, sans-serif" font-weight="600">MDS</text>

        <!-- Switch 2 (center) -->
        <rect x="215" y="145" width="70" height="30" rx="6" fill="#0f1a2e" stroke="#ffa502" stroke-width="1.2" class="node-pulse" style="animation-delay:1s"/>
        <text x="250" y="164" text-anchor="middle" fill="#ffa502" font-size="8" font-family="Inter, sans-serif" font-weight="600">CORE</text>

        <!-- Switch 3 (right) -->
        <rect x="345" y="145" width="70" height="30" rx="6" fill="#0f1a2e" stroke="#2ed573" stroke-width="1.2" class="node-pulse" style="animation-delay:1.5s"/>
        <text x="380" y="164" text-anchor="middle" fill="#2ed573" font-size="8" font-family="Inter, sans-serif" font-weight="600">NX-OS</text>

        <!-- Leaf switches row -->
        <rect x="85" y="265" width="70" height="30" rx="6" fill="#0f1a2e" stroke="#667788" stroke-width="1" class="node-pulse" style="animation-delay:0.2s"/>
        <rect x="215" y="265" width="70" height="30" rx="6" fill="#0f1a2e" stroke="#667788" stroke-width="1" class="node-pulse" style="animation-delay:0.7s"/>
        <rect x="345" y="265" width="70" height="30" rx="6" fill="#0f1a2e" stroke="#667788" stroke-width="1" class="node-pulse" style="animation-delay:1.2s"/>

        <!-- Server rack (final layer) -->
        <rect x="170" y="410" width="40" height="16" rx="3" fill="#0f1a2e" stroke="#4fc3f7" stroke-width="1" class="node-pulse" style="animation-delay:0.3s"/>
        <rect x="170" y="390" width="40" height="16" rx="3" fill="#0f1a2e" stroke="#4fc3f7" stroke-width="1" class="node-pulse" style="animation-delay:0.6s"/>
        <rect x="290" y="410" width="40" height="16" rx="3" fill="#0f1a2e" stroke="#4fc3f7" stroke-width="1" class="node-pulse" style="animation-delay:0.9s"/>
        <rect x="290" y="390" width="40" height="16" rx="3" fill="#0f1a2e" stroke="#4fc3f7" stroke-width="1" class="node-pulse" style="animation-delay:1.2s"/>

        <!-- VPC / heartbeat lines -->
        <path d="M155 160 Q160 150 165 160" stroke="#4fc3f7" stroke-width="1" fill="none" opacity="0.4"/>
        <path d="M335 160 Q340 150 345 160" stroke="#4fc3f7" stroke-width="1" fill="none" opacity="0.4"/>
      </svg>

      <div style="text-align:center;margin-top:20px;">
        <span style="font-size:12px;color:#334455;letter-spacing:1px;text-transform:uppercase;">Network Topology</span>
        <div style="display:flex;justify-content:center;gap:16px;margin-top:8px;">
          <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:#445566;"><span style="width:8px;height:8px;border-radius:50%;background:#2ed573;display:inline-block;"></span> Online</span>
          <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:#445566;"><span style="width:8px;height:8px;border-radius:50%;background:#ffa502;display:inline-block;"></span> Core</span>
          <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:#445566;"><span style="width:8px;height:8px;border-radius:50%;background:#4fc3f7;display:inline-block;"></span> Gateway</span>
        </div>
      </div>
    </div>
  </div>

<script>
function toggleTheme() {
  const icon = document.getElementById('themeIconLogin');
  const next = icon.classList.contains('bi-moon-stars-fill') ? 'light' : 'dark';
  icon.className = next === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
  localStorage.setItem('theme', next);
}
(function() {
  const t = localStorage.getItem('theme') || 'dark';
  if (t === 'light') { document.body.style.background = '#eef2f7'; document.querySelector('.login-right').style.background = 'linear-gradient(135deg, #e0e6ee 0%, #d0dae6 50%, #eef2f7 100%)'; }
  const icon = document.getElementById('themeIconLogin');
  if (t === 'dark') icon.className = 'bi bi-moon-stars-fill'; else icon.className = 'bi bi-sun-fill';
})();
</script>
</body>
</html>
