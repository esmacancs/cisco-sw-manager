<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Cisco Switch Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; color: #c8d6e5; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: linear-gradient(145deg, #111d2e, #0f1a2e); border: 1px solid #1a3050; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .login-card h2 { color: #4fc3f7; font-weight: 700; font-size: 20px; text-align: center; margin-bottom: 6px; }
    .login-card p { color: #667788; text-align: center; font-size: 12px; margin-bottom: 24px; }
    .form-control { background: #0a0e1a; border: 1px solid #1a3050; color: #c8d6e5; border-radius: 8px; padding: 10px 14px; font-size: 13px; }
    .form-control:focus { background: #0a0e1a; border-color: #4fc3f7; box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.15); color: #c8d6e5; }
    .form-control::placeholder { color: #445566; }
    .btn-login { background: linear-gradient(135deg, #4fc3f7, #2196f3); border: none; border-radius: 8px; padding: 10px; font-weight: 600; font-size: 14px; color: #fff; width: 100%; }
    .btn-login:hover { background: linear-gradient(135deg, #5fcff7, #3196f3); color: #fff; }
    .error-msg { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff4757; border-radius: 8px; padding: 10px 14px; font-size: 12px; margin-bottom: 16px; text-align: center; }
    .logo-icon { font-size: 40px; color: #4fc3f7; display: block; text-align: center; margin-bottom: 12px; }
    .footer-link { text-align: center; font-size: 11px; color: #445566; margin-top: 20px; }
    .footer-link a { color: #4fc3f7; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <i class="bi bi-hdd-stack-fill logo-icon"></i>
    <h2>Cisco Switch Manager</h2>
    <p>Sign in to your account</p>
    {% if error %}
      <div class="error-msg"><i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label" style="font-size:12px;color:#667788;font-weight:500;">USERNAME</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-size:12px;color:#667788;font-weight:500;">PASSWORD</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-login">Sign In</button>
    </form>
    <div class="footer-link">
      Default: <strong>admin</strong> / <strong>admin</strong>
    </div>
  </div>
</body>
</html>
