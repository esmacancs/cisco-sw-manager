<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create User - Cisco Switch Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-body: #0a0e1a;
      --text-primary: #c8d6e5;
      --text-secondary: #667788;
      --card-bg: linear-gradient(145deg, #111d2e, #0f1a2e);
      --border: #1a3050;
      --navbar-bg: linear-gradient(135deg, #0f1a2e 0%, #1a2a4a 100%);
      --navbar-border: #1e3a5f;
      --accent: #4fc3f7;
      --placeholder: #445566;
      --accent-rgb: 79, 195, 247;
    }
    [data-theme="light"] {
      --bg-body: #eef2f7;
      --text-primary: #1a2332;
      --text-secondary: #6b7c93;
      --card-bg: linear-gradient(145deg, #ffffff, #f5f7fa);
      --border: #d0d8e4;
      --navbar-bg: linear-gradient(135deg, #ffffff 0%, #e8ecf1 100%);
      --navbar-border: #d0d8e4;
      --accent: #2196f3;
      --placeholder: #aab5c5;
      --accent-rgb: 33, 150, 243;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-body); color: var(--text-primary); font-family: 'Segoe UI', system-ui, sans-serif; }
    .navbar { background: var(--navbar-bg) !important; border-bottom: 1px solid var(--navbar-border); padding: 10px 24px; }
    .navbar-brand { font-weight: 700; font-size: 16px; color: var(--accent) !important; }
    .card-dark { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 32px; max-width: 480px; margin: 60px auto; }
    .form-control { background: var(--bg-body); border: 1px solid var(--border); color: var(--text-primary); border-radius: 8px; padding: 10px 14px; font-size: 13px; }
    .form-control:focus { background: var(--bg-body); border-color: var(--accent); box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.15); color: var(--text-primary); }
    .form-control::placeholder { color: var(--placeholder); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #1565c0); border: none; border-radius: 8px; padding: 10px; font-weight: 600; font-size: 14px; color: #fff; width: 100%; }
    .btn-primary:hover { background: linear-gradient(135deg, var(--accent), #1976d2); color: #fff; }
    .btn-outline-secondary { border-color: var(--border); color: var(--text-secondary); }
    .btn-outline-secondary:hover { background: var(--border); color: var(--text-primary); border-color: var(--border); }
    .error-msg { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff4757; border-radius: 8px; padding: 10px 14px; font-size: 12px; margin-bottom: 16px; text-align: center; }
    label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
    .btn-theme { background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.25); color: var(--accent); border-radius: 8px; padding: 4px 10px; font-size: 14px; cursor: pointer; line-height: 1; }
    .btn-theme:hover { background: rgba(var(--accent-rgb), 0.2); }
  </style>
  <script>
    (function() {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="container-fluid px-0">
      <a href="/" class="navbar-brand"><i class="bi bi-hdd-stack-fill me-2"></i>Cisco Switch Manager</a>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-sm btn-theme" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill" id="themeIconSign"></i></button>
        <a href="/users" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
      </div>
    </div>
  </nav>
  <div class="card-dark">
    <h5 style="color:#4fc3f7;font-weight:600;margin-bottom:20px;"><i class="bi bi-person-plus-fill me-2"></i>Create User</h5>
    {% if error %}
      <div class="error-msg"><i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label>USERNAME</label>
        <input type="text" name="username" class="form-control" placeholder="Username" required>
      </div>
      <div class="mb-3">
        <label>PASSWORD</label>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <div class="mb-3">
        <label>ROLE</label>
        <select name="role" class="form-control">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Create User</button>
    </form>
  </div>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  const icon = document.getElementById('themeIconSign');
  if (icon) icon.className = next === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
}
(function() {
  const t = localStorage.getItem('theme') || 'dark';
  const icon = document.getElementById('themeIconSign');
  if (icon) icon.className = t === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
})();
</script>
</body>
</html>
