<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if edit %}Edit{% else %}Add{% endif %} Switch - Cisco Switch Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-body: #0a0e1a;
      --text-primary: #c8d6e5;
      --text-secondary: #667788;
      --card-bg: linear-gradient(145deg, #111d2e, #0f1a2e);
      --border: #1a3050;
      --navbar-bg: linear-gradient(135deg, #0f1a2e 0%, #1a2a4a 100%);
      --navbar-border: #1e3a5f;
      --accent: #4fc3f7;
      --metric-value: #e8edf2;
      --placeholder: #445566;
      --accent-rgb: 79, 195, 247;
    }
    [data-theme="light"] {
      --bg-body: #eef2f7;
      --text-primary: #1a2332;
      --text-secondary: #6b7c93;
      --card-bg: linear-gradient(145deg, #ffffff, #f5f7fa);
      --border: #d0d8e4;
      --navbar-bg: linear-gradient(135deg, #ffffff 0%, #e8ecf1 100%);
      --navbar-border: #d0d8e4;
      --accent: #2196f3;
      --metric-value: #1a2332;
      --placeholder: #aab5c5;
      --accent-rgb: 33, 150, 243;
    }
    body { background: var(--bg-body); color: var(--text-primary); font-family: 'Segoe UI', system-ui, sans-serif; }
    .navbar { background: var(--navbar-bg) !important; border-bottom: 1px solid var(--navbar-border); }
    .navbar-brand { font-weight: 700; color: var(--accent) !important; }
    .card-form { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; max-width: 520px; margin: 40px auto; }
    .form-control, .form-control:focus { background: var(--bg-body); border: 1px solid var(--border); color: var(--metric-value); border-radius: 8px; }
    .form-control:focus { box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.2); border-color: var(--accent); }
    .form-control::placeholder { color: var(--placeholder); }
    .form-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 4px; }
    .btn-primary-cisco { background: linear-gradient(135deg, #1565c0, #0d47a1); border: 1px solid #1e88e5; color: #fff; border-radius: 8px; }
    .btn-primary-cisco:hover { background: linear-gradient(135deg, #1976d2, #1565c0); color: #fff; }
    .alert-info-custom { background: rgba(var(--accent-rgb), 0.08); border: 1px solid rgba(var(--accent-rgb), 0.2); color: var(--accent); border-radius: 8px; font-size: 12px; }
    .btn-theme { background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.25); color: var(--accent); border-radius: 8px; padding: 4px 10px; font-size: 14px; cursor: pointer; line-height: 1; }
    .btn-theme:hover { background: rgba(var(--accent-rgb), 0.2); }
  </style>
  <script>
    (function() {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <nav class="navbar px-3">
    <div class="container-fluid px-0 d-flex align-items-center">
      <a href="/" class="btn btn-sm btn-outline-secondary me-3" style="border-color:#1a3050;color:#667788"><i class="bi bi-arrow-left"></i></a>
      <span class="navbar-brand"><i class="bi {% if edit %}bi-pencil-square{% else %}bi-plus-circle{% endif %} me-2"></i>{% if edit %}Edit Switch{% else %}Add Switch{% endif %}</span>
      <span class="ms-auto" style="color:var(--text-secondary);font-size:12px;"><i class="bi bi-person-fill me-1"></i>{{ current_user or 'guest' }}</span>
      <button class="btn btn-sm btn-theme ms-2" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill" id="themeIconAdd"></i></button>
      <a href="/logout" class="btn btn-sm ms-2" style="border-color:var(--border);color:var(--text-secondary)"><i class="bi bi-box-arrow-right"></i></a>
    </div>
  </nav>

  <div class="container">
    <div class="card-form p-4">
      <form method="post">
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-globe me-1"></i>IP Address *</label>
          <input type="text" name="host" class="form-control" required placeholder="10.14.0.248" value="{{ switch.host if edit else '' }}">
        </div>
        <div class="row mb-3">
          <div class="col-4">
            <label class="form-label"><i class="bi bi-person me-1"></i>Username *</label>
            <input type="text" name="username" class="form-control" required placeholder="admin" value="{{ switch.username if edit else '' }}">
          </div>
          <div class="col-4">
            <label class="form-label"><i class="bi bi-lock me-1"></i>Password {% if edit %}(leave blank to keep){% else %}*{% endif %}</label>
            <input type="password" name="password" class="form-control" {{ 'required' if not edit }}>
          </div>
          <div class="col-4">
            <label class="form-label">SSH Port</label>
            <input type="number" name="port" class="form-control" value="{{ switch.port if edit else '22' }}">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-6">
            <label class="form-label"><i class="bi bi-tag me-1"></i>Label</label>
            <input type="text" name="label" class="form-control" placeholder="e.g. DC1-Core-Switch" value="{{ switch.label if edit else '' }}">
          </div>
          <div class="col-6">
            <label class="form-label"><i class="bi bi-building me-1"></i>Site</label>
            <input type="text" name="site" class="form-control" placeholder="e.g. DataCenter1, Prod, DR" value="{{ switch.site if edit else '' }}">
          </div>
        </div>
        <button type="submit" class="btn btn-primary-cisco w-100 py-2">
          <i class="bi {% if edit %}bi-check-lg{% else %}bi-plus-lg{% endif %} me-2"></i>{% if edit %}Save Changes{% else %}Add Switch{% endif %}
        </button>
      </form>
      <div class="alert alert-info-custom mt-3 mb-0">
        <i class="bi bi-info-circle me-1"></i> Credentials are stored locally in SQLite and used only for SSH access.
      </div>
    </div>
  </div>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  const icon = document.getElementById('themeIconAdd');
  if (icon) icon.className = next === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
}
(function() {
  const t = localStorage.getItem('theme') || 'dark';
  const icon = document.getElementById('themeIconAdd');
  if (icon) icon.className = t === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
})();
</script>
</body>
</html>
