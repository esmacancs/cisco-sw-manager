<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Management - Cisco Switch Manager</title>
  <link href="/static/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-body: #0a0e1a;
      --text-primary: #c8d6e5;
      --text-secondary: #667788;
      --text-tertiary: #556677;
      --card-bg: linear-gradient(145deg, #111d2e, #0f1a2e);
      --card-bg-solid: #0f1a2e;
      --border: #1a3050;
      --navbar-bg: linear-gradient(135deg, #0f1a2e 0%, #1a2a4a 100%);
      --navbar-border: #1e3a5f;
      --accent: #4fc3f7;
      --accent-rgb: 79, 195, 247;
    }
    [data-theme="light"] {
      --bg-body: #eef2f7;
      --text-primary: #1a2332;
      --text-secondary: #6b7c93;
      --text-tertiary: #8899aa;
      --card-bg: linear-gradient(145deg, #ffffff, #f5f7fa);
      --card-bg-solid: #ffffff;
      --border: #d0d8e4;
      --navbar-bg: linear-gradient(135deg, #ffffff 0%, #e8ecf1 100%);
      --navbar-border: #d0d8e4;
      --accent: #2196f3;
      --accent-rgb: 33, 150, 243;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-body); color: var(--text-primary); font-family: 'Segoe UI', system-ui, sans-serif; }
    .navbar { background: var(--navbar-bg) !important; border-bottom: 1px solid var(--navbar-border); padding: 10px 24px; }
    .navbar-brand { font-weight: 700; font-size: 16px; color: var(--accent) !important; }
    .card-dark { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; }
    .table-cisco { width: 100%; border-collapse: collapse; font-size: 12px; }
    .table-cisco thead th { background: rgba(var(--accent-rgb), 0.08); color: var(--accent); padding: 8px 10px; text-align: left; font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); }
    .table-cisco tbody td { padding: 8px 10px; border-bottom: 1px solid rgba(var(--accent-rgb), 0.08); color: var(--text-primary); }
    .table-cisco tbody tr:hover { background: rgba(var(--accent-rgb), 0.04); }
    .badge-admin { background: rgba(var(--accent-rgb), 0.15); color: var(--accent); border: 1px solid rgba(var(--accent-rgb), 0.3); padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; }
    .badge-user { background: rgba(46, 213, 115, 0.15); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.3); padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; }
    .btn-outline-secondary { border-color: var(--border); color: var(--text-secondary); }
    .btn-outline-secondary:hover { background: var(--border); color: var(--text-primary); border-color: var(--border); }
    .btn-danger-sm { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff4757; padding: 2px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    .btn-danger-sm:hover { background: rgba(255, 71, 87, 0.2); }
    .btn-theme { background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.25); color: var(--accent); border-radius: 8px; padding: 4px 10px; font-size: 14px; cursor: pointer; line-height: 1; }
    .btn-theme:hover { background: rgba(var(--accent-rgb), 0.2); }
    .tab-toggle { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
    .tab-toggle.on { background: rgba(var(--accent-rgb), 0.15); color: var(--accent); border-color: rgba(var(--accent-rgb), 0.3); }
    .tab-toggle.off { background: transparent; color: var(--text-tertiary); border-color: var(--border); opacity: 0.5; }
    .tab-toggle:hover { opacity: 1; }
    .saved-msg { font-size: 11px; color: #2ed573; transition: opacity 0.5s; }
  </style>
  <script>
    (function() {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="container-fluid px-0 d-flex justify-content-between">
      <div>
        <a href="/" class="navbar-brand"><i class="bi bi-hdd-stack-fill me-2"></i>Cisco Switch Manager</a>
        <span style="color:var(--text-tertiary);font-size:13px;">User Management</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-sm btn-theme" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill" id="themeIconUsr"></i></button>
        <a href="/signup" class="btn btn-sm btn-outline-secondary"><i class="bi bi-person-plus me-1"></i>Add User</a>
      </div>
    </div>
  </nav>
  <div class="container-fluid px-4 py-4">
    <div class="card-dark p-3">
      <div id="user-list">
        <p style="color:#667788;text-align:center;padding:20px;"><i class="bi bi-arrow-clockwise me-1"></i>Loading...</p>
      </div>
    </div>
  </div>
  <script>
    const ALL_TABS_MGMT = [
      { id: 'interfaces',   label: 'Interfaces' },
      { id: 'vsans',        label: 'VSANs' },
      { id: 'vlans',        label: 'VLANs' },
      { id: 'modules',      label: 'Modules' },
      { id: 'inventory',    label: 'Inventory' },
      { id: 'flogi',        label: 'FLOGI' },
      { id: 'fcns',         label: 'FCNS' },
      { id: 'zoning',       label: 'Zoning' },
      { id: 'environment',  label: 'Environment' },
      { id: 'portchannels', label: 'Port Channels' },
      { id: 'devaliases',   label: 'Device Aliases' },
      { id: 'portsecurity', label: 'Port Security' },
      { id: 'scsitargets',  label: 'SCSI Targets' },
      { id: 'storage',      label: 'Storage' },
      { id: 'accounting',   label: 'Accounting' },
      { id: 'syslogs',      label: 'Syslogs' },
      { id: 'metrics',      label: 'Metrics' },
      { id: 'console',      label: 'Console' },
    ];

    function loadUsers() {
      fetch('/api/users').then(r => {
        if (!r.ok) { window.location.href = '/'; return; }
        return r.json();
      }).then(users => {
        if (!users) return;
        const el = document.getElementById('user-list');
        if (users.length === 0) {
          el.innerHTML = '<p style="color:#667788;text-align:center;padding:20px;">No users found</p>';
          return;
        }
        el.innerHTML = `<table class="table-cisco">
          <thead><tr>
            <th>User</th>
            <th>Role</th>
            <th>Tab Access</th>
            <th>Actions</th>
          </tr></thead>
          <tbody>${users.map(u => {
            const hidden = (u.hidden_tabs || '').split(',').filter(Boolean);
            const isAdmin = u.role === 'admin';
            return `<tr>
              <td><strong>${u.username}</strong></td>
              <td><span class="${isAdmin ? 'badge-admin' : 'badge-user'}">${u.role}</span></td>
              <td><div style="display:flex;flex-wrap:wrap;gap:4px;">
                ${ALL_TABS_MGMT.map(t => {
                  const on = isAdmin ? true : !hidden.includes(t.id);
                  return `<span class="tab-toggle ${on ? 'on' : 'off'}" data-user="${u.id}" data-tab="${t.id}" onclick="toggleTab(${u.id},'${t.id}',${isAdmin})"><i class="bi ${on ? 'bi-eye-fill' : 'bi-eye-slash-fill'}"></i> ${t.label}</span>`;
                }).join('')}
              </div></td>
              <td>${!isAdmin ? `<button class="btn-danger-sm" onclick="deleteUser(${u.id})"><i class="bi bi-trash me-1"></i>Delete</button>` : '<span style="color:#445566;font-size:11px;">-</span>'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`;
      });
    }

    function getHiddenTabs(userId) {
      const els = document.querySelectorAll(`.tab-toggle[data-user="${userId}"]`);
      const hidden = [];
      els.forEach(el => { if (el.classList.contains('off')) hidden.push(el.dataset.tab); });
      return hidden.join(',');
    }

    function toggleTab(userId, tabId, isAdmin) {
      if (isAdmin) return;
      const el = document.querySelector(`.tab-toggle[data-user="${userId}"][data-tab="${tabId}"]`);
      if (!el) return;
      const isOn = el.classList.contains('on');
      el.classList.toggle('on', !isOn);
      el.classList.toggle('off', isOn);
      el.querySelector('i').className = isOn ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill';
      const hidden = getHiddenTabs(userId);
      fetch('/api/users/' + userId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({hidden_tabs: hidden})
      });
    }

    function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
      fetch('/api/users/' + id, { method: 'DELETE' }).then(r => {
        if (r.ok) loadUsers();
        else r.json().then(d => alert(d.error));
      });
    }
    loadUsers();
  </script>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  const icon = document.getElementById('themeIconUsr');
  if (icon) icon.className = next === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
}
(function() {
  const t = localStorage.getItem('theme') || 'dark';
  const icon = document.getElementById('themeIconUsr');
  if (icon) icon.className = t === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
})();
</script>
</body>
</html>
